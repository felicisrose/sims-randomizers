<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sims Randomizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: #37352f;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .page-title {
    font-size: 13px;
    font-weight: 600;
    color: #9b9b9b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card {
    flex: 1;
    min-width: 200px;
    background: #f7f6f3;
    border-radius: 6px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: #9b9b9b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .result-box {
    background: #ffffff;
    border: 1px solid #e9e9e7;
    border-radius: 4px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-number {
    font-size: 2.8rem;
    font-weight: 700;
    color: #37352f;
  }

  .result-name {
    font-size: 1.4rem;
    font-weight: 500;
    color: #37352f;
  }

  .result-placeholder {
    font-size: 13px;
    color: #c7c6c2;
  }

  .btn {
    background: #37352f;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s;
    width: 100%;
  }

  .btn:hover { background: #1a1915; }
  .btn:active { transform: scale(0.99); }

  .range-row {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #9b9b9b;
    font-size: 12px;
  }

  .range-input {
    background: #ffffff;
    border: 1px solid #e9e9e7;
    border-radius: 3px;
    color: #37352f;
    font-family: inherit;
    font-size: 12px;
    padding: 3px 6px;
    width: 50px;
    text-align: center;
  }

  .range-input:focus {
    outline: none;
    border-color: #b9b9b7;
  }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid #e9e9e7;
    background: #ffffff;
    color: #9b9b9b;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .tag.active {
    background: #37352f;
    color: #ffffff;
    border-color: #37352f;
  }

  .tag:hover:not(.active) {
    border-color: #b9b9b7;
    color: #37352f;
  }

  .rolling .result-number,
  .rolling .result-name {
    opacity: 0.3;
  }
</style>
</head>
<body>

<div class="page-title">Randomizers</div>

<div class="cards">

  <div class="card" id="intCard">
    <div class="card-title">Integer Roll</div>
    <div class="range-row">
      <span>Min</span>
      <input class="range-input" id="minVal" type="number" value="1">
      <span>Max</span>
      <input class="range-input" id="maxVal" type="number" value="150">
    </div>
    <div class="result-box">
      <div id="intResult" class="result-placeholder">—</div>
    </div>
    <button class="btn" onclick="rollInteger()">Roll</button>
  </div>

  <div class="card" id="nameCard">
    <div class="card-title">Name Generator</div>
    <div class="tags">
      <span class="tag active" id="tag-any" onclick="setGender('any')">Any</span>
      <span class="tag" id="tag-f" onclick="setGender('f')">Feminine</span>
      <span class="tag" id="tag-m" onclick="setGender('m')">Masculine</span>
    </div>
    <div class="result-box">
      <div id="nameResult" class="result-placeholder">—</div>
    </div>
    <button class="btn" onclick="generateName()">Generate</button>
  </div>

</div>

<script>
  let selectedGender = 'any';

  const femaleNames = [
    "Amara","Briar","Callie","Delia","Elara","Fiona","Gemma","Hazel","Isla","Jade",
    "Kaia","Lena","Mira","Nora","Olive","Petra","Quinn","Rosa","Sage","Tara",
    "Uma","Vera","Wren","Xena","Yara","Zoe","Adira","Blythe","Cleo","Dani",
    "Elise","Freya","Giselle","Hana","Imara","Juno","Kira","Luna","Mae","Nova",
    "Opal","Piper","Remi","Selene","Thea","Ursa","Veda","Winona","Yuki","Zara",
    "Alma","Cora","Ember","Fleur","Gwen","Ivy","Jessa","Lila","Maren","Nell",
    "Orla","Poppy","Rae","Skye","Tess","Viv","Willa","Yasmin","Zelda","Aria",
    "Bea","Clara","Demi","Elodie","Rue","Calla","Sable","Ingrid","Vesper","Mina"
  ];

  const masculineNames = [
    "Arlo","Beckett","Cael","Dax","Eli","Finn","Gray","Holt","Ivan","Jace",
    "Kai","Levi","Milo","Nash","Owen","Pierce","Rex","Seth","Theo","Vance",
    "West","Zane","Alaric","Bram","Cade","Dorian","Ezra","Felix","Hugo","Jasper",
    "Knox","Lars","Matteo","Niall","Oscar","Penn","Rhys","Soren","Tate","Vito",
    "Wade","Xavier","Zev","Adrian","Beau","Cole","Dean","Emre","Ford","Hale",
    "Jules","Kael","Leon","Marc","Noel","Otto","Pax","Rafe","Stellan","Troy",
    "Axel","Bo","Drake","Elio","Griffon","Igor","Wolf","Yusuf","Zion","Cian",
    "Idris","Leif","Ronan","Samir","Tariq","Blaine","Cormac","Piers","Reed","Flynn"
  ];

  function setGender(g) {
    selectedGender = g;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    document.getElementById('tag-' + g).classList.add('active');
  }

  function rollInteger() {
    const card = document.getElementById('intCard');
    const min = parseInt(document.getElementById('minVal').value) || 1;
    const max = parseInt(document.getElementById('maxVal').value) || 150;
    const el = document.getElementById('intResult');
    card.classList.add('rolling');
    el.className = 'result-placeholder';
    el.textContent = '...';
    setTimeout(() => {
      const result = Math.floor(Math.random() * (max - min + 1)) + min;
      card.classList.remove('rolling');
      el.className = 'result-number';
      el.textContent = result;
    }, 200);
  }

  function generateName() {
    const card = document.getElementById('nameCard');
    const el = document.getElementById('nameResult');
    card.classList.add('rolling');
    el.className = 'result-placeholder';
    el.textContent = '...';
    setTimeout(() => {
      let pool;
      if (selectedGender === 'f') pool = femaleNames;
      else if (selectedGender === 'm') pool = masculineNames;
      else pool = [...femaleNames, ...masculineNames];
      const name = pool[Math.floor(Math.random() * pool.length)];
      card.classList.remove('rolling');
      el.className = 'result-name';
      el.textContent = name;
    }, 200);
  }
</script>
</body>
</html>
